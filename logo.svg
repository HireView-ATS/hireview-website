<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" width="260" height="60">
  <defs>
    <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdba74"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>

  <!-- Rangée du haut : 3 hexagones -->
  <!-- Hex 1 top -->
  <polygon points="12,2 24,2 30,12 24,22 12,22 6,12" fill="url(#hg)"/>
  <polygon points="14,5 22,5 26,12 22,19 14,19 10,12" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>

  <!-- Hex 2 top -->
  <polygon points="32,2 44,2 50,12 44,22 32,22 26,12" fill="url(#hg)"/>
  <polygon points="34,5 42,5 46,12 42,19 34,19 30,12" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>

  <!-- Hex 3 top -->
  <polygon points="52,2 64,2 70,12 64,22 52,22 46,12" fill="url(#hg)"/>
  <polygon points="54,5 62,5 66,12 62,19 54,19 50,12" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>

  <!-- Rangée du bas : 2 hexagones décalés -->
  <!-- Hex 4 bottom -->
  <polygon points="22,20 34,20 40,30 34,40 22,40 16,30" fill="url(#hg)"/>
  <polygon points="24,23 32,23 36,30 32,37 24,37 20,30" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>

  <!-- Hex 5 bottom -->
  <polygon points="42,20 54,20 60,30 54,40 42,40 36,30" fill="url(#hg)"/>
  <polygon points="44,23 52,23 56,30 52,37 44,37 40,30" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>

  <!-- Texte HireView -->
  <text x="80" y="24" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="22" fill="#1a1a2e" letter-spacing="-0.5">Hire</text>
  <text x="124" y="24" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="22" fill="#f97316" letter-spacing="-0.5">View</text>

  <!-- Sous-texte ATS -->
  <text x="124" y="40" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="14" fill="#9ca3af" letter-spacing="3">ATS</text>

</svg>
